# Makoy resource gate — auto-inject gate.js into every HTML file in /resources/
#
# Add this location block inside your server {} block in nginx.conf.
# Adjust `root` to wherever your static site files live on the VPS.
#
# With this in place, any .html file you drop into /resources/ is automatically
# gated — no need to edit the file itself.

location /resources/ {
    root /var/www/makoy;          # adjust to your actual static root

    # Inject gate.js as the very first script inside <head>
    sub_filter '<head>' '<head><script src="/resources/gate.js"></script>';
    sub_filter_once on;
    sub_filter_types text/html;
}
